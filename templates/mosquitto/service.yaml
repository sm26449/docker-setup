name: mosquitto
description: "MQTT broker"

variables:
  MQTT_PORT:
    default: "1883"
    description: "MQTT port"
    prompt: true
  MQTT_WS_PORT:
    default: "9001"
    description: "MQTT WebSocket port"
    prompt: true
  MQTT_USERNAME:
    default: "mqtt"
    description: "MQTT username"
    prompt: true
  MQTT_PASSWORD:
    default: ""
    description: "MQTT password"
    generate: password
    prompt: true

# Copy config files from template to ${DOCKER_ROOT}/<stack>/<service>/
copy_files:
  - src: mosquitto.conf
    dest: config/mosquitto.conf
  - src: pwfile
    dest: config/pwfile

# Hooks for pre/post deployment actions
hooks:
  pre_deploy:
    - "mkdir -p ${SERVICE_DATA}/config ${SERVICE_DATA}/data ${SERVICE_DATA}/logs"
    - "chmod 755 ${SERVICE_DATA}/config ${SERVICE_DATA}/data ${SERVICE_DATA}/logs"
    - "chmod 644 ${SERVICE_DATA}/config/mosquitto.conf 2>/dev/null || true"
    - "chmod 600 ${SERVICE_DATA}/config/pwfile 2>/dev/null || true"
    - "chown -R 1883:1883 ${SERVICE_DATA} 2>/dev/null || true"
  post_deploy:
    - "sleep 3"
    - "docker exec ${CONTAINER_NAME} mosquitto_passwd -b /mosquitto/config/pwfile ${MQTT_USERNAME} ${MQTT_PASSWORD} 2>/dev/null && docker exec ${CONTAINER_NAME} kill -HUP 1 2>/dev/null && echo '✓ MQTT user created and config reloaded' || echo 'Note: Add MQTT user manually with Credentials menu'"
    - "docker logs ${CONTAINER_NAME} 2>&1 | tail -3 || true"

compose: |
  ${SERVICE_NAME}:
    # Pinned to a specific minor — audit B-O5 (pv-stack-ui Phase-2).
    # `:latest` floats and the 2.0→2.1 bump silently changed retain
    # semantics in the past. Bump deliberately, not by surprise.
    # Mosquitto's 2.1 line only ships as -alpine on Docker Hub; that
    # variant is also what :latest currently resolves to.
    image: eclipse-mosquitto:2.1.2-alpine
    container_name: ${SERVICE_NAME}
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ${DOCKER_ROOT}/${SERVICE_NAME}/config:/mosquitto/config
      - ${DOCKER_ROOT}/${SERVICE_NAME}/data:/mosquitto/data
      - ${DOCKER_ROOT}/${SERVICE_NAME}/logs:/mosquitto/log
